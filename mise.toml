[tools]
bun = "1.3.10"

[tasks.dev]
description = "Run the Bun full-stack dev server with hot reload and browser HMR"
run = "bun run dev"

[tasks.build]
description = "Build the production Bun server bundle into dist"
run = "bun run build"

[tasks.test]
description = "Run type checks and unit tests"
run = "bun run check"

[tasks.versions]
description = "Check pinned tool and package versions against official upstream releases"
run = "bun run versions"

[tasks.profile]
description = "Profile local scene build and meshing performance"
run = "bun run profile"

[tasks.profile-stream]
description = "Profile local procedural residency and meshing transitions"
run = "bun run profile:stream"

[tasks.profile-game-stream]
description = "Profile the incremental game-path streaming loop"
run = "bun run profile:game-stream"

[tasks.serve]
description = "Run the built production server bundle"
run = "bun run start"
