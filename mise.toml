[tools]
bun = "1.3.10"

[tasks.dev]
description = "Build the browser bundle and run the Bun server"
run = "bun run dev"

[tasks.build]
description = "Build the browser bundle"
run = "bun run build"

[tasks.test]
description = "Run type checks and unit tests"
run = "bun run check"

[tasks.versions]
description = "Check pinned tool and package versions against official upstream releases"
run = "bun run versions"

[tasks.profile]
description = "Profile local scene build and meshing performance"
run = "bun run profile"

[tasks.serve]
description = "Run the server without rebuilding in a loop"
run = "bun run start"
