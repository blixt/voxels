[tools]
bun = "1.3.10"

[tasks.dev]
description = "Run the Bun full-stack dev server with hot reload and browser HMR"
run = "bun run dev"

[tasks.build]
description = "Build the production Bun server bundle into dist"
run = "bun run build"

[tasks.test]
description = "Run type checks"
run = "bun run check"

[tasks.versions]
description = "Check pinned tool and package versions against official upstream releases"
run = "bun run versions"

[tasks.serve]
description = "Run the built production server bundle"
run = "bun run start"
