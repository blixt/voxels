<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Voxels Game</title>
    <link rel="stylesheet" href="../../public/styles.css" />
  </head>
  <body class="page-game">
    <main class="shell" data-app="game">
      <section class="game-shell">
        <canvas class="game-viewport" data-role="viewport" tabindex="-1"></canvas>
        <div class="game-overlay">
          <div class="game-status-strip" data-role="objective-panel"></div>
          <div class="game-performance-strip" data-role="performance-strip"></div>
          <div
            class="discovery-achievement-layer"
            data-role="discovery-achievements"
            aria-live="polite"
            aria-atomic="true"
          ></div>
          <aside class="game-inventory-panel" data-role="inventory-panel" hidden></aside>
          <svg class="target-overlay" data-role="target-overlay" aria-hidden="true"></svg>
          <div class="game-bottom-hud" data-role="interaction-hud"></div>
          <div class="crosshair" aria-hidden="true"></div>
          <button class="capture-overlay" data-role="capture" type="button" aria-label="Click to play">
            <span class="capture-card">
              <p class="capture-status" data-role="capture-status">Preparing World</p>
              <strong class="capture-title" data-role="capture-title">Loading nearby terrain</strong>
              <p class="capture-subtitle" data-role="capture-subtitle"></p>
              <div class="capture-progress" data-role="capture-progress" aria-hidden="true">
                <span class="capture-progress-bar" data-role="capture-progress-bar"></span>
              </div>
              <p class="capture-detail" data-role="capture-detail"></p>
            </span>
          </button>
        </div>
      </section>
    </main>
    <script type="module" src="../client/game.ts"></script>
  </body>
</html>
