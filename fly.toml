app = "voxels-world-blixt"
primary_region = "cdg"
kill_signal = "SIGTERM"
kill_timeout = "30s"

[build]
dockerfile = "Dockerfile.world-service"

[env]
RUST_BACKTRACE = "1"

[[mounts]]
source = "world_data"
destination = "/data"
initial_size = "1GB"
scheduled_snapshots = false
auto_extend_size_threshold = 80
auto_extend_size_increment = "1GB"
auto_extend_size_limit = "5GB"

[http_service]
internal_port = 8080
force_https = true
auto_stop_machines = "stop"
auto_start_machines = true
min_machines_running = 0

[http_service.concurrency]
type = "connections"
soft_limit = 192
hard_limit = 256

[[http_service.checks]]
grace_period = "30s"
interval = "15s"
method = "GET"
path = "/healthz"
protocol = "http"
timeout = "5s"

[[vm]]
size = "shared-cpu-2x"
memory = "2GB"
