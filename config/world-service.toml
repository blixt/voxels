# Versioned, server-owned world configuration. The browser client never reads this file.
schema_version = 16
world_id = "766f7865-6c73-406c-6f63-616c00000001"
world_seed = 1592642302

# Terrain Diffusion is the checked-in default. Set this to "procedural-v16" for the deterministic
# authored generator; clients consume the same canonical protocol either way.
source = "terrain-diffusion-30m"

[transport]
# Native transport is deliberately loopback-only. Port 0 may be used by tests for an ephemeral port.
listen = "127.0.0.1:9777"
allowed_origins = ["http://127.0.0.1:5173", "http://localhost:5173"]
# Replace with a random RFC WebSocket subprotocol token on each local installation.
auth_subprotocol_token = "replace-with-a-random-local-token"
max_frame_bytes = 16777216
# Memory bound for completed world products waiting behind a slow client.
max_queued_outbound_bytes_per_client = 33554432
# One shared token bucket covers both sockets belonging to a player. Critical control traffic
# preempts; collision/startup data, authoritative changes, realtime presence, visible products, and
# prefetch share remaining capacity with decreasing weights so no active class permanently starves.
outbound_bandwidth_bytes_per_second = 98304
outbound_bandwidth_burst_bytes = 65536
max_in_flight_batches = 16
max_connections = 1024
# Covers the worst-case negotiated request window for all 1024 admitted world connections.
global_queue_capacity = 16384
# Immutable encoded batches are shared across co-located clients and identical retries.
product_cache_bytes = 268435456
generation_workers = 8
generation_workers_per_client = 2

[presence]
# Per-client spatial deltas tick at about 30 Hz; unchanged poses are omitted.
broadcast_interval_ms = 33
max_players = 1024
# Browsers normally send at 30 Hz; this higher ceiling permits modest timer catch-up without abuse.
max_pose_updates_per_second = 60
# Internal interest management only; this remains one authoritative, unsharded world.
spatial_cell_metres = 64
interest_radius_metres = 256
interest_hysteresis_metres = 32
near_radius_metres = 32
mid_radius_metres = 96
near_update_interval_ms = 50
mid_update_interval_ms = 100
far_update_interval_ms = 250
# Dense crowds degrade update freshness under a fixed receiver budget, never membership.
max_records_per_delta = 64
prediction_error_centimetres = 25
look_error_milliradians = 175

[gameplay]
# Local development explicitly permits collision-aware creative flight. Production worlds can
# disable this without changing the client; the capability then disappears from WorldOpened.
allow_creative_flight = true
# Browser raycasts stop at 5m. The extra metre absorbs ordinary ordering skew between the
# independent presence and world sockets; it is a hard cap, not client-controlled velocity credit.
interaction_reach_centimetres = 500
interaction_latency_slack_centimetres = 100
interaction_pose_max_age_ms = 1000
# The native controller sprints at about 7.1m/s. Bounded token buckets permit modest packet gaps
# while preventing a client from reusing the fixed slack on every pose.
max_horizontal_speed_centimetres_per_second = 900
max_vertical_speed_centimetres_per_second = 1200
movement_slack_centimetres = 100
movement_credit_window_ms = 500

[environment]
# A complete accelerated day lasts 20 real minutes. Set this to 0 to hold the exact epoch fraction
# for deterministic screenshots or authored events. The Unix-epoch anchor survives daemon/HMR
# restarts and every client extrapolates it from the server's synchronized monotonic clock.
day_length_seconds = 1200.0
world_day_number_at_unix_epoch = 0
day_fraction_at_unix_epoch = 0.72
# One familiar 365.2422-day year lasts about 5.1 real days at the accelerated day length.
days_per_year = 365.2422
moon_sidereal_orbit_days = 27.321661
moon_orbit_phase_at_world_epoch = 0.0
# The planar world is the universal cover of this Earth-sized celestial sphere. Terrain does not
# wrap; only latitude, longitude, seasons, and the transported sky frame repeat.
planet_circumference_metres = 40075016.0
axial_tilt_degrees = 23.4393
moon_orbit_inclination_degrees = 5.145
celestial_seed = 1470258925
celestial_revision = 1
weather_cycle_seconds = 900.0
weather_fraction_at_unix_epoch = 0.08
# World-space cloud advection is shared by the visible sky layer and its terrain shadows.
cloud_offset_metres_at_unix_epoch = [0.0, 0.0]
cloud_velocity_metres_per_second = [5.5, 1.6]
cloud_coverage = 0.24
cloud_base_metres = 550.0
cloud_top_metres = 1800.0
weather_seed = 1474984685
weather_revision = 1

[edits]
# Native server authority. This checked-in local path is ignored by git; deployments should point
# it at durable storage. Compatibility tokens make local iteration start fresh state after schema,
# world, or source changes without deleting the previous world. Explicit paths remain strict.
database = "../tmp/world-state/schema-{edit_schema}/{world_id}-{source_hash}.sqlite3"
change_queue_capacity = 256

[spawn]
# Must lie inside the selected source's valid coverage. Startup samples this exact coordinate.
xz_voxels = [0, 0]

[terrain_diffusion]
# Omit model_cache to use ~/Library/Caches/voxels/terrain-diffusion on macOS.
# A relative path is resolved from this file's directory.
precision = "float16"
# Canonical voxel X/Z coordinate of the finite 15.36 km tile's minimum corner. The checked-in
# placement centers the tile on the configured spawn and leaves ample meshing-halo coverage.
world_origin_voxels = [-76800, -76800]
# Preserve the model's physical 30 m horizontal spacing. Unlike Minecraft blocks, canonical voxels
# already represent a fixed 10 cm, so stretching only the horizontal axes would flatten slopes.
horizontal_scale = 1
# Coordinate-stable latent-window row/column. Each step moves 7.68 km in model space.
latent_window = [-2, -1]
# Learned terrain-quality logits used by the paper's showcase generator. Higher final bins favor
# sharper, more visually interesting terrain while preserving deterministic coordinate semantics.
quality_histogram = [0.0, 0.0, 0.0, 1.0, 1.5]
# Heightfield composer flood height for the learned terrain source.
sea_level_voxels = 52
